<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antiverse Arsenal Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container"></div>

  <div id="spawn-banner"><span id="spawn-timer">10</span></div>

  <div id="hud">
    <section class="hud-panel hud-score-panel" aria-label="Score">
      <div id="score" class="hud-row hud-score-primary"><span id="score-label"></span></div>
      <div id="highscore" class="hud-row hud-score-secondary"><span id="highscore-label"></span></div>
    </section>

    <section class="hud-panel hud-round-panel" aria-label="Round information">
      <div id="round" class="hud-row hud-round-primary"><span id="round-label"></span></div>
      <div id="next-universe" class="hud-row"><span id="next-universe-label"></span></div>
      <div id="incursions" class="hud-row"><span id="incursion-label"></span></div>
      <div id="stability" class="hud-row"><span id="stability-label"></span></div>
    </section>

    <section class="hud-panel hud-ability-panel" aria-label="Movement abilities">
      <div id="warp" class="hud-row hud-ability-row"><span id="warp-label"></span></div>
      <div id="dash" class="hud-row hud-ability-row"><span id="dash-label"></span></div>
    </section>

    <section id="hull" class="hud-panel hud-hull-module" aria-label="Hull integrity">
      <div class="hull-gauge" id="hull-gauge">
        <div class="hull-gauge-face">
          <div class="hull-gauge-needle" id="hull-gauge-needle"></div>
          <div class="hull-gauge-hub"></div>
        </div>
      </div>
      <div class="hull-readout">
        <span class="hull-readout-title">Hull Integrity</span>
        <span id="hull-label"></span>
      </div>
    </section>
  </div>

  <div id="message-overlay" class="hidden">
    <div id="message-text"></div>
  </div>

  <div id="powerup-overlay" class="hidden">
    <div>
      <h2 id="shop-title"></h2>
      <p id="shop-subtitle"></p>
      <div id="powerup-options"></div>
    </div>
  </div>

  <div id="pause-overlay" class="hidden">
    <div class="menu-card pause-card">
      <h1 id="pause-title"></h1>
      <button id="resume-button"></button>
      <button id="controls-button"></button>
      <button id="pause-restart-button"></button>
      <button id="quit-button"></button>
    </div>
    <div id="controls-panel" class="hidden" role="dialog" aria-modal="true" aria-labelledby="controls-title">
      <div class="menu-card controls-panel-card">
        <button id="controls-close-button" aria-label="Close controls">×</button>
        <h2 id="controls-title"></h2>
        <p id="controls-body"></p>
      </div>
    </div>
  </div>

  <div id="gameover-overlay" class="hidden">
    <div class="menu-card gameover-card">
      <h1 id="gameover-title"></h1>
      <p id="final-score-label"></p>
      <p id="final-highscore-label"></p>
      <p id="final-wrap-hits-label"></p>
      <p id="final-highest-wrap-shot-label"></p>
      <button id="restart-button"></button>
    </div>
  </div>

  <!-- Engine stuff... -->
  <script src="scripts/engine/sprites.js"></script>
  <script src="scripts/engine/audio.js"></script>
  <script src="scripts/engine/text.js"></script>
  <script src="scripts/engine/utils.js"></script>
  <script src="scripts/engine/window-layout.js"></script>
  <script src="scripts/engine/space-routing.js"></script>
  <script src="scripts/engine/universe.js"></script>

  <!-- Game stuff... -->
  <script src="scripts/game/entities/base/damageable.js"></script>
  <script src="scripts/game/entities/player.js"></script>
  <script src="scripts/game/entities/bullet.js"></script>
  <script src="scripts/game/entities/base/enemy.js"></script>
  <script src="scripts/game/entities/normal-enemy.js"></script>
  <script src="scripts/game/entities/shotgun-enemy.js"></script>
  <script src="scripts/game/entities/machine-gun-enemy.js"></script>
  <script src="scripts/game/entities/hull-pickup.js"></script>
  <script src="scripts/game/entities/asteroid.js"></script>
  <script src="scripts/game/entities/floating-text.js"></script>
  <script src="scripts/game/explosion-fx.js"></script>
  <script src="scripts/game/global.js"></script>
  <script src="scripts/game/dom.js"></script>
  <script src="scripts/game/game.js"></script>
  <script src="scripts/game/input.js"></script>
  <script src="scripts/game/universe-manager.js"></script>
  <script src="scripts/game/warping.js"></script>
  <script src="scripts/game/laser.js"></script>
  <script src="scripts/game/runtime.js"></script>
</body>
</html>
